# Named-PCM config so Armstrong's cpal audio backend can select the individual
# 4-card ALSA loopback endpoints by name. cpal identifies devices by name, and the
# raw snd-aloop cards all report the same "Loopback" name, so they cannot be told
# apart without named aliases. Point Armstrong at this file via ALSA_CONFIG_PATH.
#
# `type plug` adapts mono<->stereo at the cpal boundary. The cable runs at 48 kHz
# and Armstrong's built-in resampler presents 48 kHz to ALSA (ARM_FORCE_48K=1), so
# the plug does no rate conversion. The endpoints map onto the same card/dev points
# the ALSA transport captures and plays, so Armstrong shares the rig with the other
# modems:
#   ARM_TXA = card2 dev1   ARM_RXA = card3 dev1
#   ARM_TXB = card4 dev0   ARM_RXB = card5 dev0
#   (cards: Loopback=2  Loopback1=3  Loopback2=4  Loopback3=5)
</usr/share/alsa/alsa.conf>

pcm."ARM_TXA" { type plug  slave.pcm "hw:Loopback,1"   hint.description "ARM_TXA" }
pcm."ARM_RXA" { type plug  slave.pcm "hw:Loopback1,1"  hint.description "ARM_RXA" }
pcm."ARM_TXB" { type plug  slave.pcm "hw:Loopback2,0"  hint.description "ARM_TXB" }
pcm."ARM_RXB" { type plug  slave.pcm "hw:Loopback3,0"  hint.description "ARM_RXB" }
